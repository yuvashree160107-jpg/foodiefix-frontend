<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register for FoodieFix — Premium Restaurant Management System">
    <title>FoodieFix — Register</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-brand">
            <span class="logo-icon">🍽️</span>
            <h1>FoodieFix</h1>
            <p>Create your account</p>
        </div>

        <form id="register-form" autocomplete="off">
            <div class="form-group">
                <label for="reg-fullname">Full Name</label>
                <input type="text" id="reg-fullname" class="form-control" placeholder="Enter your full name" name="fullname" required />
            </div>

            <div class="form-group">
                <label for="reg-username">Username</label>
                <input type="text" id="reg-username" class="form-control" placeholder="Choose a username" name="username" required />
            </div>

            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" class="form-control" placeholder="Minimum 6 characters" name="password" required />
            </div>

            <div class="form-group">
                <label for="reg-role">Role</label>
                <select id="reg-role" class="form-control" name="role">
                    <option value="MANAGER" selected>Manager</option>
                    <option value="RECEPTIONIST">Receptionist</option>
                    <option value="SERVER">Server</option>
                    <option value="HEAD_CHEF">Head Chef</option>
                    <option value="CUSTOMER">Customer</option>
                </select>
            </div>

            <div id="reg-error" class="alert alert-error"></div>
            <div id="reg-success" class="alert alert-success"></div>

            <button type="submit" id="reg-btn" class="btn btn-primary btn-full">
                Create Account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="index.html">Sign in</a>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'https://foodiefix-backend-2.onrender.com';

    document.getElementById('register-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const fullname = document.getElementById('reg-fullname').value.trim();
        const username = document.getElementById('reg-username').value.trim();
        const password = document.getElementById('reg-password').value;
        const role     = document.getElementById('reg-role').value;
        const errDiv   = document.getElementById('reg-error');
        const sucDiv   = document.getElementById('reg-success');
        const btn      = document.getElementById('reg-btn');

        errDiv.classList.remove('show');
        sucDiv.classList.remove('show');

        if (!fullname || !username || !password) {
            errDiv.textContent = 'Please fill in all required fields.';
            errDiv.classList.add('show');
            return;
        }
        if (password.length < 6) {
            errDiv.textContent = 'Password must be at least 6 characters.';
            errDiv.classList.add('show');
            return;
        }

        btn.textContent = 'Creating account...';
        btn.disabled = true;

        try {
            const res = await fetch(API_BASE + '/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: username,
                    password: password,
                    fullname: fullname,
                    role: role
                })
            });

            if (res.ok) {
                sucDiv.textContent = 'Registration successful! Redirecting to login...';
                sucDiv.classList.add('show');
                document.getElementById('register-form').reset();
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                const data = await res.json().catch(function() { return {}; });
                errDiv.textContent = data.message || 'Registration failed. Username may already be taken.';
                errDiv.classList.add('show');
            }

        } catch (err) {
            errDiv.textContent = 'Cannot connect to server. Make sure backend is running on port 8080.';
            errDiv.classList.add('show');
        } finally {
            btn.textContent = 'Create Account';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
